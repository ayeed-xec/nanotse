# 3060 v6: full 18.75M-param run with the complete v6 loss stack (mag_stft + mel).
#
# Validates the a100_v1 architecture+loss design on 3060 hardware before paying
# for cloud compute. Same effective batch (32) as v5, so v5-vs-v6 is a clean
# single-variable comparison: bigger model + mel loss, everything else equal.
#
# Differences from configs/3060_v5.yaml:
#   - model d_model: 256 -> 512   (4.75M -> 18.75M params)
#   - model n_layers: 2 -> 4
#   - model n_heads: 4 -> 8
#   - loss_weights.mel: 0.0 -> 0.3
#   - batch_size: 8 -> 4         (compensates for bigger model VRAM use)
#   - accum_steps: 4 -> 8         (keeps effective_batch=32 same as v5)
#
# VRAM budget (validated by 3060_v6_smoke):
#   batch=2 used 1.2 GB; batch=4 should use ~2.4 GB; with EMA + grads + opt
#   state at full step ~3.5-4.0 GB. Well under 6 GB.
#
# Wall time projection: smoke did 500 effective steps in 4.7 min (0.72 sps with
# batch=2+accum=4); batch=4+accum=8 doubles micro-batches per step but better
# GPU utilisation roughly cancels out -> ~0.6 effective sps -> ~5.5-6.5 hours
# for 12500 effective steps.
seed: 0
device: auto
data:
  root: data/v2
  sample_rate: 16000
  fps: 25
  clip_seconds: 4.0
  num_clips: 50000
  batch_size: 4
train:
  steps: 12500
  lr: 5.0e-4
  log_every: 25
  ckpt_every: 1250
  val_every: 500
  val_clips: 500
  grad_clip: 5.0
  snr_db_low: -5.0
  snr_db_high: 10.0
  warmup_steps: 250
  min_lr_ratio: 0.05
  ema_decay: 0.99
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  accum_steps: 8
  precision: fp32
  loss_weights:
    si_snr: 1.0
    infonce: 0.1
    asd: 0.0
    consistency: 0.0
    mag_stft: 0.5
    mel: 0.3
model:
  name: nanotse
  with_visual: true
  with_enrollment: true
  with_slots: true
  with_asd: false
  d_model: 512
  n_layers: 4
  n_heads: 8
