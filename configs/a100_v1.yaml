# A100 first scale-up run. Combines the v5 recipe with:
#   1. Bigger model: 4.69M -> 27.09M params (d_model 256->576, n_layers 2->5,
#      n_heads 4->8). Bump from the original 18.75M after v6 train signal
#      showed the 18.75M model approaching capacity ceiling. 27M leaves room
#      for full-VoxCeleb2 scaling without hitting the param/data balance wall.
#   2. Multi-resolution log-mel perceptual loss (weight 0.3) on top of mag_stft.
#      Standard HiFi-GAN-style auxiliary; +0.5-1.0 dB typical.
#   3. bf16 mixed precision (A100 native, ~1.5-2x speedup vs fp32).
#   4. Full a100 step budget (100k effective steps; 8x v5's compute).
#   5. EMA decay 0.999 (proportional to longer run; half-life 693 steps =
#      0.7% of total, well under the 5% threshold).
#
# Manifest: data/v2/ from 3060 work (face_ok-filtered VoxCeleb2-mix, 432 speakers).
#
# Projected outcome based on v5/v6 trajectory + scale-up math:
#   v6 partial (3060, 18.75M): val SDRi +0.19 dB at step 2000
#   +0.5-1.0 dB from full 12500 v6 steps          ->  +0.7-1.2 dB
#   +0.3-0.6 dB from 27M vs 18.75M                ->  +1.0-1.8 dB
#   +0.5-1.0 dB from 8x compute on A100           ->  +1.5-2.8 dB
#   +1.0-2.0 dB from full VoxCeleb2 data scale    ->  +2.5-4.8 dB
#   Realistic mid-projection: +3.0 to +3.5 dB val SDRi
#
# Decision threshold: >=+3.5 dB green-lights ICASSP 2027 push.
seed: 0
device: auto
data:
  root: data/v2
  sample_rate: 16000
  fps: 25
  clip_seconds: 4.0
  num_clips: 500000
  batch_size: 32
train:
  steps: 100000
  lr: 5.0e-4
  log_every: 100
  ckpt_every: 5000
  val_every: 1000
  val_clips: 2000
  grad_clip: 5.0
  snr_db_low: -5.0
  snr_db_high: 10.0
  warmup_steps: 2000
  min_lr_ratio: 0.05
  ema_decay: 0.999
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  accum_steps: 1
  precision: bf16
  loss_weights:
    si_snr: 1.0
    infonce: 0.1
    asd: 0.0
    consistency: 0.0
    mag_stft: 0.5
    mel: 0.3
model:
  name: nanotse
  with_visual: true
  with_enrollment: true
  with_slots: true
  with_asd: false
  d_model: 576
  n_layers: 5
  n_heads: 8
