# Cross-platform smoke train config — ≤ 10 min wall-clock target.
# `device: auto` picks CUDA → MPS → CPU at runtime so the same config
# works on M3 (MPS), RTX 3060 WSL2 (CUDA), and A100 (CUDA).
seed: 0
device: auto
data:
  root: data/smoke
  sample_rate: 16000
  fps: 25
  clip_seconds: 4.0
  num_clips: 200
  batch_size: 4
train:
  steps: 500
  lr: 3.0e-4
  log_every: 20
  ckpt_every: 250
  loss_weights:
    si_snr: 1.0
    infonce: 0.1     # slot-identity contrastive, uses VoxCeleb2 speaker_id
    asd: 0.0         # off until real per-frame ASD GT (W7-8)
    consistency: 0.0 # off until multi-window dataset (W5-6 IBA work)
model:
  name: nanotse  # full AV NanoTSE with visual + slot memory (W3.5)
